<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Olivia | My Creations</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  
  <style>
    :root {
      --bg-x: 50%;
      --bg-y: 50%;
      --theme-text: #f1f1f1;
      --theme-card: #8a4864;
      --theme-card-hover: #1f1016;
      --theme-accent: #8a4864;
      --bg-gradient: radial-gradient(circle at var(--bg-x) var(--bg-y), #1b1b1b, #3a3a3a, #000000);
    }

    body {
      margin: 0;
      padding-top: 120px;
      color: var(--theme-text);
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      background: var(--bg-gradient);
      transition: background 1s ease;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-gradient);
      z-index: -1;
      transition: background 0.3s ease, background-position 0.1s ease;
      pointer-events: none;
    }
    .navbar-wrapper {
      background-color: var(--theme-accent);
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 1000px;
      z-index: 1000;
      border-radius: 40px;
      background: rgba(86, 113, 148, 0.2); /* transparenter für Glasmorphismus */
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      padding: 0.5rem 1rem;
    }

    .navbar {
      background-color: transparent !important;
    }

    .navbar-brand img {
      height: 40px;
    }

    .nav-link {
      color: var(--theme-text) !important;
      transition: color 0.3s ease;
    }

    .nav-link:hover {
      color: #85e0a3 !important;
    }

    .btn-main {
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      font-size: 1.1rem;
      background-color: var(--theme-accent);
      color: white;
      border: none;
      border-radius: 30px;
      transition: background-color 0.3s ease;
    }

    .btn-main:hover {
      background: color-mix(in srgb, var(--theme-accent) 80%, #000 20%);
      color: #fff;
    }
.btn-creations {
       color: var(--theme-text);
      background-color: var(--theme-accent);
      border: none;
      padding: 0.6rem 1.4rem;
      border-radius: 30px;
      transition: all 0.3s ease;
      font-weight: 500;
      text-shadow: none;
    }

    .btn-creations:hover {
      background: color-mix(in srgb, var(--theme-accent) 80%, #000 20%);
      color: #fff;
    }

    .filter-btn.active {
  background-color: var(--theme-accent);
  color: white;
  border-color: var(--theme-accent);
}


  </style>
</head>
<body>

<!-- Navbar -->
<div class="navbar-wrapper">
  <nav class="navbar navbar-expand-lg navbar-dark">
      <a class="navbar-brand" href="index.html">

      </a>

        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="projekte.html">Projects & Work</a></li>
          <li class="nav-item"><a class="nav-link" href="ueber-mich.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="kontakt.html">Contact</a></li>
        </ul>
        <button id="themeBtn" class="btn-creations" title="Surprise me! 🎨">Surprise</button>
      </div>
  </nav>
</div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.addEventListener('mousemove', e => {
    const x = (e.clientX / window.innerWidth) * 100;
    const y = (e.clientY / window.innerHeight) * 100;
    document.documentElement.style.setProperty('--bg-x', `${x}%`);
    document.documentElement.style.setProperty('--bg-y', `${y}%`);
  });

  const themes = [
    {
      bg: 'radial-gradient(circle at var(--bg-x) var(--bg-y), #2e2a47, #1e1e2f, #121218)',
      text: '#f1f1f1',
      card: '#1f1f2e',
      cardHover: '#2b2b3f',
      accent: '#353587'
    },
    {
      bg: 'radial-gradient(circle at var(--bg-x) var(--bg-y), #2d1b2f, #3e2b44, #121218)',
      text: '#fbefff',
      card: '#3a243e',
      cardHover: '#513251',
      accent: '#8153a3'
    },
    {
      bg: 'radial-gradient(circle at var(--bg-x) var(--bg-y), #1b2e2f, #26494b, #121218)',
      text: '#e0f7f7',
      card: '#1d2f30',
      cardHover: '#295253',
      accent: '#3eaba2'
    }
  ];

  let lastThemeIndex = -1;

  document.getElementById('themeBtn').addEventListener('click', () => {
    let newIndex;
    do {
      newIndex = Math.floor(Math.random() * themes.length);
    } while (newIndex === lastThemeIndex && themes.length > 1);

    const theme = themes[newIndex];
    lastThemeIndex = newIndex;

    document.documentElement.style.setProperty('--theme-text', theme.text);
    document.documentElement.style.setProperty('--theme-card', theme.card);
    document.documentElement.style.setProperty('--theme-card-hover', theme.cardHover);
    document.documentElement.style.setProperty('--theme-accent', theme.accent);
    document.documentElement.style.setProperty('--bg-gradient', theme.bg);
    document.body.style.background = theme.bg;
    });
</script>
